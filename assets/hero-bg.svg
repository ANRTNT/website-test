<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0f6b41"/>
<stop offset="100%" stop-color="#0a4a2d"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="30%" r="75%">
<stop offset="0%" stop-color="#ffd873" stop-opacity="0.16"/>
<stop offset="100%" stop-color="#ffd873" stop-opacity="0"/>
</radialGradient>
<radialGradient id="vignette" cx="50%" cy="45%" r="75%">
<stop offset="0%" stop-color="#000000" stop-opacity="0"/>
<stop offset="75%" stop-color="#000000" stop-opacity="0"/>
<stop offset="100%" stop-color="#04140c" stop-opacity="0.6"/>
</radialGradient>
</defs>

<!-- full-bleed grass -->
<rect width="1600" height="900" fill="url(#grass)"/>

<!-- mow stripes across the whole pitch, alternating tone -->
<g fill="#116b40" opacity="0.55">
<rect x="0" y="0" width="145" height="900"/>
<rect x="290" y="0" width="145" height="900"/>
<rect x="580" y="0" width="145" height="900"/>
<rect x="870" y="0" width="145" height="900"/>
<rect x="1160" y="0" width="145" height="900"/>
<rect x="1450" y="0" width="150" height="900"/>
</g>

<!-- soft top light glow for atmosphere -->
<rect width="1600" height="900" fill="url(#glow)"/>

<!-- ===== pitch markings (aerial view) ===== -->
<g stroke="#ffffff" stroke-opacity="0.95" stroke-width="6" fill="none" stroke-linecap="round">
<!-- outer boundary -->
<rect x="90" y="80" width="1420" height="740"/>
<!-- halfway line -->
<line x1="800" y1="80" x2="800" y2="820"/>
<!-- centre circle + spot -->
<circle cx="800" cy="450" r="115"/>
<circle cx="800" cy="450" r="7" fill="#ffffff" stroke="none"/>

<!-- left penalty area -->
<rect x="90" y="255" width="230" height="390"/>
<rect x="90" y="345" width="85" height="210"/>
<circle cx="270" cy="450" r="6" fill="#ffffff" stroke="none"/>
<path d="M320,352 A110,110 0 0 1 320,548"/>

<!-- right penalty area -->
<rect x="1280" y="255" width="230" height="390"/>
<rect x="1425" y="345" width="85" height="210"/>
<circle cx="1330" cy="450" r="6" fill="#ffffff" stroke="none"/>
<path d="M1280,352 A110,110 0 0 0 1280,548"/>

<!-- corner arcs -->
<path d="M90,110 A30,30 0 0 1 120,80"/>
<path d="M1510,110 A30,30 0 0 0 1480,80"/>
<path d="M90,790 A30,30 0 0 0 120,820"/>
<path d="M1510,790 A30,30 0 0 1 1480,820"/>
</g>

<!-- mustard highlight accents: centre spot ring + penalty spots -->
<circle cx="800" cy="450" r="115" fill="none" stroke="#ffc046" stroke-opacity="0.4" stroke-width="2"/>
<circle cx="270" cy="450" r="10" fill="none" stroke="#ffc046" stroke-opacity="0.55" stroke-width="2"/>
<circle cx="1330" cy="450" r="10" fill="none" stroke="#ffc046" stroke-opacity="0.55" stroke-width="2"/>

<rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
